<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de raizes</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="button-input.css">
</head>
<body>
    <header>
        <h1>CALCULADORA</h1>
    </header>
    <main class="container">
        <h1>Coeficiente a</h1>
        <div class="input-wrapper">
        <input type="number" placeholder="Coeficiente a" name="text" class="input" id="a">
        </div>
        <h1>
            Coeficiente b
        </h1>
        <div class="input-wrapper">
        <input type="number" placeholder="Coeficiente b" name="text" class="input" id="b">
        </div>
        <h1>Coeficiente c</h1>
        <div class="input-wrapper">
        <input type="number" placeholder="Coeficiente c" name="text" class="input" id="c">
        </div>

        <div ontouchstart="calcular()">
            <div class="button">
                <a href="#" onclick="calcular()">Calcular</a>
            </div>
        </div>

        <div id="res"></div>   
    </main>
    <footer>
        <p>&copy;Todos os direitos reservados a Enzo Rodrigues Ferrari</p>
    </footer>
    <script src="script.js"></script>
</body>
</html>
