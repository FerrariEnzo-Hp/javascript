<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="quadrado" onmouseenter="teste()">
        <h1>Olá mundo!</h1>
    </div>
    <script>
        function teste() {
            var x = document.querySelector('div#quadrado')
            x.innerHTML = '<h1>hello world!</h1>'
        }

    </script>
</body>
</html>
